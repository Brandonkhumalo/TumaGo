name: Deploy to Production
on:
  push:
    branches: [main]

env:
  AWS_REGION: af-south-1
  ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - { name: gateway,      context: backend/go_services/gateway }
          - { name: location,     context: backend/go_services/location }
          - { name: matching,     context: backend/go_services/matching }
          - { name: django,       context: backend/django }
          - { name: notification, context: backend/notification }
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push ${{ matrix.service.name }}
        run: |
          docker build \
            -t $ECR_REGISTRY/tumago-${{ matrix.service.name }}:${{ github.sha }} \
            -t $ECR_REGISTRY/tumago-${{ matrix.service.name }}:latest \
            ${{ matrix.service.context }}/
          docker push $ECR_REGISTRY/tumago-${{ matrix.service.name }}:${{ github.sha }}
          docker push $ECR_REGISTRY/tumago-${{ matrix.service.name }}:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            aws ecr get-login-password --region af-south-1 | docker login --username AWS --password-stdin ${{ secrets.ECR_REGISTRY }}
            cd /home/ubuntu/TumaGo/backend
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            docker image prune -f
