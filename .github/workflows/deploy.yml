name: Deploy to EC2

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: true
          command_timeout: 30m
          script: |
            cd ~/TumaGo

            # Pull latest code
            git pull origin main

            # Ensure swap exists (prevents OOM during builds on t3.small)
            if [ ! -f /swapfile ]; then
                sudo fallocate -l 2G /swapfile
                sudo chmod 600 /swapfile
                sudo mkswap /swapfile
                sudo swapon /swapfile
                echo '/swapfile none swap sw 0 0' | sudo tee -a /etc/fstab
            fi
            sudo swapon /swapfile 2>/dev/null || true

            cd backend

            # Build services one at a time to avoid OOM on t3.small (2GB RAM)
            docker compose -f docker-compose.prod.yml build web
            docker compose -f docker-compose.prod.yml build gateway
            docker compose -f docker-compose.prod.yml build location
            docker compose -f docker-compose.prod.yml build matching
            docker compose -f docker-compose.prod.yml build notification_service
            docker compose -f docker-compose.prod.yml build frontend

            # Start all services (images already built)
            docker compose -f docker-compose.prod.yml up -d

            # Run database migrations
            docker compose -f docker-compose.prod.yml run --rm web python manage.py migrate --noinput

            # Clean up old images
            docker image prune -f

            # ── Nginx + SSL ────────────────────────────────────────────────
            NGINX_SRC=~/TumaGo/backend/infrastructure/nginx

            # Ensure nginx and certbot are installed
            sudo apt-get update -qq
            sudo apt-get install -y nginx certbot python3-certbot-nginx

            # Ensure certbot webroot exists
            sudo mkdir -p /var/www/certbot

            # Remove default site so it doesn't conflict
            sudo rm -f /etc/nginx/sites-enabled/default

            # If SSL certs exist, use the HTTPS config directly
            if [ -d /etc/letsencrypt/live/tumago.co.zw ] && [ -f /etc/letsencrypt/live/tumago.co.zw/fullchain.pem ]; then
                sudo cp "$NGINX_SRC/tumago-ssl.conf" /etc/nginx/sites-available/tumago
            else
                # No certs — deploy HTTP config first so certbot can verify the domain
                sudo cp "$NGINX_SRC/tumago.conf" /etc/nginx/sites-available/tumago
                sudo ln -sf /etc/nginx/sites-available/tumago /etc/nginx/sites-enabled/tumago
                sudo nginx -t && sudo systemctl reload nginx

                # Request SSL certificate from Let's Encrypt
                sudo certbot certonly \
                    --webroot \
                    -w /var/www/certbot \
                    -d tumago.co.zw \
                    -d www.tumago.co.zw \
                    --non-interactive \
                    --agree-tos \
                    --email brandon@tishanyq.co.zw \
                    --no-eff-email

                # Switch to HTTPS config now that certs are installed
                sudo cp "$NGINX_SRC/tumago-ssl.conf" /etc/nginx/sites-available/tumago
            fi

            # Enable site, test config, and reload
            sudo ln -sf /etc/nginx/sites-available/tumago /etc/nginx/sites-enabled/tumago
            sudo nginx -t && sudo systemctl reload nginx
