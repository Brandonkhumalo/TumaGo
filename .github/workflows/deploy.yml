name: Deploy to EC2

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: true
          script: |
            cd ~/TumaGo

            # Pull latest code
            git pull origin main

            # Build and deploy all services (backend + frontend)
            cd backend
            docker compose -f docker-compose.prod.yml up -d --build

            # Run database migrations (safe — only applies new changes, never erases data)
            docker compose -f docker-compose.prod.yml run --rm web python manage.py migrate --noinput

            docker image prune -f

            # Update nginx config (auto-selects HTTP or HTTPS based on SSL cert existence)
            NGINX_SRC=~/TumaGo/backend/infrastructure/nginx
            if [ -d /etc/letsencrypt/live/tumago.co.zw ]; then
                sudo cp "$NGINX_SRC/tumago-ssl.conf" /etc/nginx/sites-available/tumago
            else
                sudo cp "$NGINX_SRC/tumago.conf" /etc/nginx/sites-available/tumago
            fi
            sudo ln -sf /etc/nginx/sites-available/tumago /etc/nginx/sites-enabled/tumago
            sudo rm -f /etc/nginx/sites-enabled/default
            sudo nginx -t && sudo systemctl reload nginx
