# TumaGo API Gateway — nginx reverse proxy
# Routes requests to Django backend and FastAPI microservices
# Handles WebSocket upgrades, static files, and rate limiting

worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" rt=$request_time';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # Performance
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain application/json application/javascript text/css;

    # ── Rate limiting zones ─────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api_general:10m rate=60r/m;
    limit_req_zone $binary_remote_addr zone=api_auth:10m    rate=10r/m;
    limit_req_zone $binary_remote_addr zone=api_delivery:10m rate=10r/m;

    # ── Upstream: Django backend ────────────────────────────────────────────
    upstream django_backend {
        least_conn;
        server web:8000 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    # ── Upstream: Location service ──────────────────────────────────────────
    upstream location_service {
        least_conn;
        server location_service:8001 max_fails=3 fail_timeout=30s;
        keepalive 64;
    }

    # ── Upstream: Matching service ──────────────────────────────────────────
    upstream matching_service {
        least_conn;
        server matching_service:8002 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    # ── Upstream: Notification service ─────────────────────────────────────
    upstream notification_service {
        least_conn;
        server notification_service:8003 max_fails=3 fail_timeout=30s;
        keepalive 16;
    }

    server {
        listen 80;
        server_name _;

        client_max_body_size 20M;

        # Static files — served directly by nginx
        location /static/ {
            alias /static/;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        # WebSocket — driver location (location service)
        location /ws/driver_location {
            proxy_pass http://location_service;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # Auth endpoints — strict rate limiting
        location ~ ^/(login|signup|driver/signup)/ {
            limit_req zone=api_auth burst=5 nodelay;
            proxy_pass http://django_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Delivery request — medium rate limiting
        location /delivery/request/ {
            limit_req zone=api_delivery burst=3 nodelay;
            proxy_pass http://django_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Internal matching endpoint (only accessible from Django container)
        location /internal/match/ {
            allow 172.16.0.0/12;   # Docker internal
            allow 10.0.0.0/8;
            deny all;
            proxy_pass http://matching_service/match/;
            proxy_set_header Host $host;
        }

        # All other API routes → Django
        location / {
            limit_req zone=api_general burst=20 nodelay;
            proxy_pass http://django_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_connect_timeout 10s;
            proxy_read_timeout 60s;
        }
    }
}
