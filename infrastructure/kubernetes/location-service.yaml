# Location Service Deployment + Service + HPA
apiVersion: apps/v1
kind: Deployment
metadata:
  name: location-service
  namespace: tumago
  labels:
    app: location-service
spec:
  replicas: 5
  selector:
    matchLabels:
      app: location-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 2
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: location-service
    spec:
      containers:
        - name: location-service
          image: tumago/location-service:latest
          ports:
            - containerPort: 8001
          envFrom:
            - configMapRef:
                name: tumago-config
            - secretRef:
                name: tumago-secrets
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 15
            periodSeconds: 30
      terminationGracePeriodSeconds: 60   # Allow WebSockets to drain
---
apiVersion: v1
kind: Service
metadata:
  name: location-service
  namespace: tumago
spec:
  selector:
    app: location-service
  ports:
    - port: 8001
      targetPort: 8001
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: location-service-hpa
  namespace: tumago
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: location-service
  minReplicas: 5
  maxReplicas: 30
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 50
