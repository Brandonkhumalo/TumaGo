apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: tumago
  labels:
    app: notification-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
        - name: notification-service
          image: tumago/notification-service:latest
          ports:
            - containerPort: 8003
          envFrom:
            - configMapRef:
                name: tumago-config
            - secretRef:
                name: tumago-secrets
          volumeMounts:
            - name: firebase-secret
              mountPath: /secrets
              readOnly: true
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /health
              port: 8003
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: firebase-secret
          secret:
            secretName: firebase-credentials
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: tumago
spec:
  selector:
    app: notification-service
  ports:
    - port: 8003
      targetPort: 8003
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: notification-service-hpa
  namespace: tumago
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: notification-service
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
