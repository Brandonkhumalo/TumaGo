# ---------------------------------------------------------------------------
# Development compose — Hybrid Go + Django architecture
# Run from: backend/
#
# Go:     gateway (routing), location (WebSocket GPS), matching (driver finder)
# Python: Django (auth, CRUD, admin), Dramatiq worker
# Infra:  Redis, PostgreSQL, PgBouncer, Prometheus, Grafana
# ---------------------------------------------------------------------------

services:

  # ── Go API Gateway ──────────────────────────────────────────────────────
  gateway:
    build:
      context: ./go_services/gateway
      dockerfile: Dockerfile
    ports:
      - "80:80"
    environment:
      SECRET_KEY: ${SECRET_KEY}
      DJANGO_BACKEND: web:8000
      LOCATION_SERVICE: location:8001
      MATCHING_SERVICE: matching:8002
      STATIC_DIR: /static
      LISTEN_ADDR: ":80"
      WHATSAPP_VERIFY_TOKEN: ${WHATSAPP_VERIFY_TOKEN}
      WHATSAPP_SERVICE: whatsapp:8004
    volumes:
      - django_static:/static:ro
    depends_on:
      - web
      - location
      - matching
      - whatsapp
    restart: always

  # ── Go Location Service ─────────────────────────────────────────────────
  location:
    build:
      context: ./go_services/location
      dockerfile: Dockerfile
    expose:
      - "8001"
    environment:
      SECRET_KEY: ${SECRET_KEY}
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD:-postgres}@pgbouncer:5432/postgres?sslmode=disable
      LISTEN_ADDR: ":8001"
    depends_on:
      - redis
      - pgbouncer
    restart: always

  # ── Go Matching Service ─────────────────────────────────────────────────
  matching:
    build:
      context: ./go_services/matching
      dockerfile: Dockerfile
    expose:
      - "8002"
    environment:
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD:-postgres}@pgbouncer:5432/postgres?sslmode=disable
      SEARCH_RADIUS_KM: ${SEARCH_RADIUS_KM:-15}
      LISTEN_ADDR: ":8002"
    depends_on:
      - redis
      - pgbouncer
    restart: always

  # ── Django ASGI (Daphne) ────────────────────────────────────────────────
  web:
    build:
      context: ./django
      dockerfile: Dockerfile
    expose:
      - "8000"
    environment:
      SECRET_KEY: ${SECRET_KEY}
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@pgbouncer:5432/postgres
      REDIS_URL: redis://redis:6379
      DEBUG: ${DEBUG:-False}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost}
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY}
      FIREBASE_CREDENTIALS: ${FIREBASE_CREDENTIALS}
      FIREBASE_CREDENTIALS_PATH: /secrets/firebase-credentials.json
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_SES_REGION: ${AWS_SES_REGION:-af-south-1}
      SES_FROM_EMAIL: ${SES_FROM_EMAIL:-noreply@tishanyq.co.zw}
      GATEWAY_URL: http://gateway:80
      LOCATION_SERVICE_URL: http://location:8001
      MATCHING_SERVICE_URL: http://matching:8002
      NOTIFICATION_SERVICE_URL: http://notification:8003
    volumes:
      - django_static:/app/staticfiles
      - ${FIREBASE_CREDENTIALS_FILE:-./notification/firebase-credentials.json}:/secrets/firebase-credentials.json:ro
    depends_on:
      pgbouncer:
        condition: service_started
      redis:
        condition: service_started
    restart: always

  # ── Dramatiq background workers ────────────────────────────────────────
  worker:
    build:
      context: ./django
      dockerfile: Dockerfile
    command: ["dramatiq", "TumaGo_Server.views.DriverViews.deliveryMatching.tasks", "--processes", "2", "--threads", "4"]
    environment:
      SECRET_KEY: ${SECRET_KEY}
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@pgbouncer:5432/postgres
      REDIS_URL: redis://redis:6379
      DEBUG: "False"
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY}
      FIREBASE_CREDENTIALS: ${FIREBASE_CREDENTIALS}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_SES_REGION: ${AWS_SES_REGION:-af-south-1}
      SES_FROM_EMAIL: ${SES_FROM_EMAIL:-noreply@tishanyq.co.zw}
    depends_on:
      - redis
      - pgbouncer
    restart: always

  # ── WhatsApp Service ───────────────────────────────────────────────────
  whatsapp:
    build:
      context: ./whatsapp
      dockerfile: Dockerfile
    expose:
      - "8004"
    environment:
      WHATSAPP_ACCESS_TOKEN: ${WHATSAPP_ACCESS_TOKEN}
      WHATSAPP_PHONE_NUMBER_ID: ${WHATSAPP_PHONE_NUMBER_ID}
      WHATSAPP_VERIFY_TOKEN: ${WHATSAPP_VERIFY_TOKEN}
      WHATSAPP_API_VERSION: ${WHATSAPP_API_VERSION:-v21.0}
      REDIS_URL: redis://redis:6379
      DJANGO_API_URL: http://web:8000/api/v1
      SECRET_KEY: ${SECRET_KEY}
    depends_on:
      - redis
      - web
    restart: always

  # ── Notification Service (FCM push) ──────────────────────────────────
  notification:
    build:
      context: ./notification
      dockerfile: Dockerfile
    expose:
      - "8003"
    environment:
      REDIS_URL: redis://redis:6379
      FIREBASE_CREDENTIALS_PATH: /secrets/firebase-credentials.json
    volumes:
      - ${FIREBASE_CREDENTIALS_FILE:-./notification/firebase-credentials.json}:/secrets/firebase-credentials.json:ro
    depends_on:
      - redis
    restart: always

  # ── Redis ───────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru --save 900 1 --save 300 10
    ports:
      - "6379:6379"
    restart: always

  # ── PostgreSQL ──────────────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      retries: 5
    restart: always

  # ── PgBouncer ───────────────────────────────────────────────────────────
  pgbouncer:
    image: edoburu/pgbouncer:latest
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_USER: postgres
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      DB_NAME: postgres
      POOL_MODE: transaction
      MAX_CLIENT_CONN: "1000"
      DEFAULT_POOL_SIZE: "25"
      AUTH_TYPE: scram-sha-256
    ports:
      - "5432:5432"
    depends_on:
      db:
        condition: service_healthy
    restart: always

volumes:
  postgres_data:
  django_static:
