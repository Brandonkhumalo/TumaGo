# ---------------------------------------------------------------------------
# t3.small compose — Single EC2 instance (2 vCPU, 2 GB RAM)
# Optimized for testing/demo on AWS Free Tier or $100 credits
#
# Run from: backend/
#   docker compose -f docker-compose.t3small.yml up -d --build
# ---------------------------------------------------------------------------

services:

  # ── Go API Gateway ──────────────────────────────────────────────────────
  gateway:
    build:
      context: ./go_services/gateway
      dockerfile: Dockerfile
    ports:
      - "80:80"
    environment:
      SECRET_KEY: ${SECRET_KEY}
      DJANGO_BACKEND: web:8000
      LOCATION_SERVICE: location:8001
      MATCHING_SERVICE: matching:8002
      STATIC_DIR: /static
      LISTEN_ADDR: ":80"
    volumes:
      - django_static:/static:ro
    depends_on:
      - web
      - location
      - matching
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 64M

  # ── Go Location Service ─────────────────────────────────────────────────
  location:
    build:
      context: ./go_services/location
      dockerfile: Dockerfile
    expose:
      - "8001"
    environment:
      SECRET_KEY: ${SECRET_KEY}
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD}@pgbouncer:5432/postgres?sslmode=disable
      LISTEN_ADDR: ":8001"
    depends_on:
      - redis
      - pgbouncer
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 64M

  # ── Go Matching Service ─────────────────────────────────────────────────
  matching:
    build:
      context: ./go_services/matching
      dockerfile: Dockerfile
    expose:
      - "8002"
    environment:
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD}@pgbouncer:5432/postgres?sslmode=disable
      SEARCH_RADIUS_KM: ${SEARCH_RADIUS_KM:-15}
      LISTEN_ADDR: ":8002"
    depends_on:
      - redis
      - pgbouncer
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 64M

  # ── Django ASGI (Daphne) ────────────────────────────────────────────────
  web:
    build:
      context: ./django
      dockerfile: Dockerfile
    expose:
      - "8000"
    environment:
      SECRET_KEY: ${SECRET_KEY}
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@pgbouncer:5432/postgres
      REDIS_URL: redis://redis:6379
      DEBUG: ${DEBUG:-False}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-*}
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY}
      FIREBASE_CREDENTIALS: ${FIREBASE_CREDENTIALS}
    volumes:
      - django_static:/app/staticfiles
    depends_on:
      pgbouncer:
        condition: service_started
      redis:
        condition: service_started
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M

  # ── Dramatiq background worker ──────────────────────────────────────────
  worker:
    build:
      context: ./django
      dockerfile: Dockerfile
    command: >
      dramatiq TumaGo_Server.views.DriverViews.deliveryMatching.tasks
      --processes 1 --threads 2
    environment:
      SECRET_KEY: ${SECRET_KEY}
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@pgbouncer:5432/postgres
      REDIS_URL: redis://redis:6379
      DEBUG: "False"
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY}
      FIREBASE_CREDENTIALS: ${FIREBASE_CREDENTIALS}
    depends_on:
      - redis
      - pgbouncer
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M

  # ── Notification Service ────────────────────────────────────────────────
  notification:
    build:
      context: ./notification
      dockerfile: Dockerfile
    expose:
      - "8003"
    environment:
      REDIS_URL: redis://redis:6379
      FIREBASE_CREDENTIALS: ${FIREBASE_CREDENTIALS}
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M

  # ── Redis ───────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --save ""
    volumes:
      - redis_data:/data
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 280M

  # ── PostgreSQL ──────────────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: postgres
    command: >
      postgres
      -c shared_buffers=128MB
      -c effective_cache_size=256MB
      -c work_mem=4MB
      -c maintenance_work_mem=32MB
      -c max_connections=50
      -c wal_buffers=4MB
      -c checkpoint_completion_target=0.9
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 15s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

  # ── PgBouncer ───────────────────────────────────────────────────────────
  pgbouncer:
    image: edoburu/pgbouncer:latest
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_USER: postgres
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: postgres
      POOL_MODE: transaction
      MAX_CLIENT_CONN: "100"
      DEFAULT_POOL_SIZE: "10"
      AUTH_TYPE: plain
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 32M

volumes:
  postgres_data:
  redis_data:
  django_static:
