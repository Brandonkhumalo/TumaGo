global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'django_backend'
    static_configs:
      - targets: ['web:8000']
    metrics_path: '/metrics'

  - job_name: 'location_service'
    static_configs:
      - targets: ['location_service:8001']
    metrics_path: '/metrics'

  - job_name: 'matching_service'
    static_configs:
      - targets: ['matching_service:8002']
    metrics_path: '/metrics'

  - job_name: 'notification_service'
    static_configs:
      - targets: ['notification_service:8003']
    metrics_path: '/metrics'

  - job_name: 'redis'
    static_configs:
      - targets: ['redis_exporter:9121']

  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres_exporter:9187']

  - job_name: 'nginx'
    static_configs:
      - targets: ['nginx_exporter:9113']

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
