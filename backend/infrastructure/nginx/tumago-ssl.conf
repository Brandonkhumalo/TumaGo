# TumaGo — Full HTTPS nginx config (after certbot has created SSL certs)
# Deploy script auto-selects this when /etc/letsencrypt/live/tumago.co.zw/ exists

# ── HTTP → HTTPS redirect ────────────────────────────────────────────────
server {
    listen 80;
    server_name tumago.co.zw www.tumago.co.zw;

    # Certbot renewal verification
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS server ─────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name tumago.co.zw www.tumago.co.zw;

    ssl_certificate     /etc/letsencrypt/live/tumago.co.zw/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tumago.co.zw/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    client_max_body_size 20M;

    # ── Backend API → Go Gateway (:8080) ─────────────────────────────────
    location /api/v1/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ── WebSocket — driver location tracking ─────────────────────────────
    location /ws/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ── WhatsApp webhook ─────────────────────────────────────────────────
    location /whatsapp/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Health check ─────────────────────────────────────────────────────
    location /health {
        proxy_pass http://127.0.0.1:8080;
    }

    # ── Django static files ──────────────────────────────────────────────
    location /static/ {
        proxy_pass http://127.0.0.1:8080;
    }

    # ── Frontend (Next.js) — everything else ─────────────────────────────
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
