# TumaGo — Optional TLS termination proxy
# In production, this sits in front of the Go gateway for HTTPS.
# For development, the Go gateway handles everything directly on port 80.
#
# Architecture: Client → nginx (TLS) → Go Gateway → {Django, Location, Matching}

worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 4096;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" rt=$request_time';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain application/json application/javascript text/css;

    # ── Upstream: Go API Gateway ──────────────────────────────────────────
    upstream go_gateway {
        least_conn;
        server gateway:8080 max_fails=3 fail_timeout=30s;
        keepalive 64;
    }

    # ── HTTP server (no domain yet — serving via Elastic IP) ───────────────
    server {
        listen 80;
        server_name _;

        client_max_body_size 20M;

        # Everything goes to the Go gateway — it handles routing,
        # rate limiting, JWT auth, and WebSocket upgrades internally.
        location / {
            proxy_pass http://go_gateway;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }
    }

    # ── HTTPS server (uncomment when you have a domain + SSL cert) ───────
    # server {
