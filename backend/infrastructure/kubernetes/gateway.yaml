# Go API Gateway Deployment + Service + HPA
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: tumago
  labels:
    app: gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gateway
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
        - name: gateway
          image: tumago/gateway:latest
          ports:
            - containerPort: 80
          envFrom:
            - configMapRef:
                name: tumago-config
            - secretRef:
                name: tumago-secrets
          env:
            - name: DJANGO_BACKEND
              value: "django-backend-service:8000"
            - name: LOCATION_SERVICE
              value: "location-service:8001"
            - name: MATCHING_SERVICE
              value: "matching-service:8002"
            - name: LISTEN_ADDR
              value: ":80"
          resources:
            requests:
              memory: "32Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: gateway-service
  namespace: tumago
spec:
  selector:
    app: gateway
  ports:
    - port: 80
      targetPort: 80
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: gateway-hpa
  namespace: tumago
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: gateway
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
