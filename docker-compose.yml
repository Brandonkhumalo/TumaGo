version: '3.9'

services:
  web:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - .:/app
    depends_on:
      - redis

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  worker:
    build: .
    command: dramatiq yourapp.tasks --processes 2 --threads 4
    env_file:
      - .env
    depends_on:
      - redis
