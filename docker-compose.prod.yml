version: '3.8'

# ---------------------------------------------------------------------------
# Production-grade compose for cloud VM / single-node deployments.
# For full Kubernetes deployment use infrastructure/kubernetes/ manifests.
#
# Services:  nginx | django (3x) | location_service (3x) | matching_service (2x)
#            notification_service | dramatiq_worker (2x)
#            redis | pgbouncer | postgres | prometheus | grafana
# ---------------------------------------------------------------------------

x-django-env: &django-env
  DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@pgbouncer:5432/postgres
  REDIS_URL: redis://redis:6379
  SECRET_KEY: ${SECRET_KEY}
  DEBUG: "False"
  ALLOWED_HOSTS: ${ALLOWED_HOSTS:-api.tumago.com}
  GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY}
  FIREBASE_CREDENTIALS: ${FIREBASE_CREDENTIALS}
  CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-https://api.tumago.com}

x-fastapi-env: &fastapi-env
  REDIS_URL: redis://redis:6379
  DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@pgbouncer:5432/postgres
  SECRET_KEY: ${SECRET_KEY}

services:

  # ── API Gateway ───────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./TumaGo_Backend/staticfiles:/static:ro
      - nginx_certs:/etc/letsencrypt:ro
    depends_on:
      - web
      - location_service
    restart: always
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 256M

  # ── Django ASGI — 3 replicas behind nginx ─────────────────────────────────
  web:
    image: ${REGISTRY:-tumago}/backend:${VERSION:-latest}
    build:
      context: ./TumaGo_Backend
      dockerfile: Dockerfile
    expose:
      - "8000"
    environment:
      <<: *django-env
    depends_on:
      - pgbouncer
      - redis
    restart: always
    deploy:
      replicas: 3
      resources:
        limits:
          cpus: '1'
          memory: 512M

  # ── Dramatiq workers — 2 replicas ─────────────────────────────────────────
  worker:
    image: ${REGISTRY:-tumago}/backend:${VERSION:-latest}
    command: >
      dramatiq TumaGo_Server.views.DriverViews.deliveryMatching.tasks
      --processes 4 --threads 8
    environment:
      <<: *django-env
    depends_on:
      - redis
      - pgbouncer
    restart: always
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '2'
          memory: 512M

  # ── Location Service — 3 replicas ────────────────────────────────────────
  location_service:
    image: ${REGISTRY:-tumago}/location-service:${VERSION:-latest}
    build:
      context: ./location_service
      dockerfile: Dockerfile
    expose:
      - "8001"
    environment:
      <<: *fastapi-env
    depends_on:
      - redis
      - pgbouncer
    restart: always
    deploy:
      replicas: 3
      resources:
        limits:
          cpus: '1'
          memory: 256M

  # ── Matching Service — 2 replicas ────────────────────────────────────────
  matching_service:
    image: ${REGISTRY:-tumago}/matching-service:${VERSION:-latest}
    build:
      context: ./matching_service
      dockerfile: Dockerfile
    expose:
      - "8002"
    environment:
      <<: *fastapi-env
      SEARCH_RADIUS_KM: "15"
    depends_on:
      - redis
      - pgbouncer
    restart: always
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '1'
          memory: 256M

  # ── Notification Service ─────────────────────────────────────────────────
  notification_service:
    image: ${REGISTRY:-tumago}/notification-service:${VERSION:-latest}
    build:
      context: ./notification_service
      dockerfile: Dockerfile
    expose:
      - "8003"
    environment:
      REDIS_URL: redis://redis:6379
      FIREBASE_CREDENTIALS_PATH: /secrets/firebase-credentials.json
    volumes:
      - ${FIREBASE_CREDENTIALS_FILE}:/secrets/firebase-credentials.json:ro
    depends_on:
      - redis
    restart: always
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  # ── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    command: >
      redis-server
      --maxmemory 1gb
      --maxmemory-policy allkeys-lru
      --save ""
      --requirepass ${REDIS_PASSWORD:-}
    volumes:
      - redis_data:/data
    restart: always
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1.2G

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      retries: 5
    restart: always
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G

  # ── PgBouncer ─────────────────────────────────────────────────────────────
  pgbouncer:
    image: bitnami/pgbouncer:1.22.1
    environment:
      POSTGRESQL_HOST: db
      POSTGRESQL_PORT: 5432
      POSTGRESQL_USERNAME: postgres
      POSTGRESQL_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRESQL_DATABASE: postgres
      PGBOUNCER_DATABASE: postgres
      PGBOUNCER_POOL_MODE: transaction
      PGBOUNCER_MAX_CLIENT_CONN: 2000
      PGBOUNCER_DEFAULT_POOL_SIZE: 25
    depends_on:
      db:
        condition: service_healthy
    restart: always

  # ── Prometheus ────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.52.0
    volumes:
      - ./infrastructure/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    restart: always

  # ── Grafana ───────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.2
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: "https://${ALLOWED_HOSTS:-api.tumago.com}/grafana"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infrastructure/monitoring/grafana-datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml:ro
    depends_on:
      - prometheus
    restart: always

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:
  nginx_certs:
